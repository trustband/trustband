name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Sync (incl. live extra + dev tools)
        run: uv sync --extra live
      - name: Lint
        run: uv run ruff check .
      - name: Type-check
        run: uv run mypy src
      - name: Test + coverage gate
        run: uv run pytest -q --cov=trustband --cov-fail-under=90
      - name: Benchmark (offline, deterministic)
        run: uv run trustband bench
